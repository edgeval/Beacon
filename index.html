<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; connect-src https: http:; img-src 'self' https: data:; style-src 'self' https://cdnjs.cloudflare.com 'unsafe-inline'; script-src 'self' https://cdn.jsdelivr.net 'unsafe-inline'; font-src 'self' https://cdnjs.cloudflare.com data:;">
    <title>Beacon · Gateway Portal</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.2"></script>

    <style>
        body {
            background: linear-gradient(135deg, #f3f4f6 0%, #e5e7eb 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Noto Sans SC', 'Microsoft YaHei', sans-serif;
            transition: background-color 0.5s ease;
        }
        @media (prefers-color-scheme: dark) {
            body { background: linear-gradient(135deg, #0b0f19 0%, #111827 100%); }
        }
        .fa-solid, .fas, .fa-brands, .fab, i[class*="fa-"] {
            font-family: "Font Awesome 6 Free", "Font Awesome 6 Brands" !important;
            font-weight: 900 !important;
            font-style: normal !important;
            font-variant: normal !important;
            text-rendering: auto !important;
        }
        .gradient-text {
            background: linear-gradient(45deg, #3b82f6, #6366f1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        @media (prefers-color-scheme: dark) {
            .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; }
        }
        .gpu-slide {
            transition: transform 1.2s ease-in-out, opacity 0.5s ease, background-color 0.5s ease, border-color 0.5s ease;
            will-change: transform;
        }
        a {
            -webkit-user-drag: none;
            -webkit-touch-callout: default;
        }

        .domain-trigger {
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            -webkit-user-drag: none;
            touch-action: pan-y;
        }

        .domain-trigger:focus {
            outline: none;
        }

        .domain-trigger:focus-visible {
            background: rgba(99, 102, 241, 0.12);
            box-shadow: inset 0 0 0 1px rgba(99, 102, 241, 0.32);
        }

        #default-domain.domain-trigger:focus-visible {
            background: rgba(255, 255, 255, 0.14);
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.34);
        }

        .domain-tooltip {
            position: fixed;
            z-index: 1000;
            max-width: min(86vw, 380px);
            padding: 9px 12px;
            border: 1px solid rgba(255, 255, 255, 0.11);
            border-radius: 10px;
            background: rgba(17, 24, 39, 0.88);
            color: rgba(255, 255, 255, 0.96);
            font-size: 12px;
            line-height: 1.45;
            font-weight: 600;
            letter-spacing: 0.01em;
            overflow-wrap: anywhere;
            box-shadow: 0 8px 24px rgba(15, 23, 42, 0.2);
            backdrop-filter: blur(14px) saturate(135%);
            -webkit-backdrop-filter: blur(14px) saturate(135%);
            opacity: 0;
            transform: translateY(3px);
            pointer-events: none;
            transition: opacity 0.16s ease, transform 0.16s ease;
        }

        .domain-tooltip::after {
            content: '';
            position: absolute;
            left: 50%;
            width: 8px;
            height: 8px;
            background: inherit;
            border-right: inherit;
            border-bottom: inherit;
            transform: translateX(-50%) rotate(45deg);
        }

        .domain-tooltip[data-placement="top"]::after {
            bottom: -5px;
        }

        .domain-tooltip[data-placement="bottom"]::after {
            top: -5px;
            transform: translateX(-50%) rotate(225deg);
        }

        .domain-tooltip.is-visible {
            opacity: 1;
            transform: translateY(0);
        }

        @media (prefers-color-scheme: light) {
            .domain-tooltip {
                background: rgba(255, 255, 255, 0.9);
                color: #1f2937;
                border-color: rgba(148, 163, 184, 0.24);
                box-shadow: 0 8px 24px rgba(51, 65, 85, 0.14);
            }
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-0 sm:p-6 text-gray-800 dark:text-gray-100">

    <div class="w-full max-w-xl min-h-screen sm:min-h-0 bg-white dark:bg-gray-900/90 sm:rounded-3xl shadow-none sm:shadow-2xl border-0 sm:border border-gray-100 dark:border-gray-800 overflow-hidden transition-colors duration-500">

        <div class="p-6 sm:p-8 border-b border-gray-50 dark:border-gray-800/80 bg-gradient-to-b from-blue-50/40 dark:from-indigo-950/20 to-transparent pt-12 sm:pt-10 flex flex-col items-center">
            <div class="flex items-center gap-3 mb-2.5">
                <i id="theme-accent-icon" class="fa-solid fa-bolt-lightning text-2xl sm:text-3xl text-indigo-600 dark:text-indigo-400 animate-pulse"></i>
                <h1 class="text-3xl sm:text-4xl font-bold tracking-wide">Beacon</h1>
            </div>
            <p class="text-sm text-gray-500 dark:text-gray-400 flex items-center justify-center gap-1 text-center">
                <span class="gradient-text font-semibold" id="i18n-sub-bold">智能线路优选</span> · <span id="i18n-sub-text">等待 engine 初始化</span>
            </p>
        </div>

        <div class="p-6 sm:p-8 space-y-6">

            <div id="default-line-card" class="bg-gradient-to-br from-indigo-600 via-purple-600 to-violet-700 dark:from-indigo-700 dark:via-purple-700 dark:to-violet-800 rounded-3xl p-6 sm:p-8 text-white shadow-xl shadow-purple-600/20 dark:shadow-none flex flex-col items-start border border-white/10 relative overflow-hidden transition-all duration-500">
                <div class="absolute -top-12 -right-12 w-44 h-44 bg-white/5 rounded-full pointer-events-none"></div>

                <div class="bg-white/15 backdrop-blur-md px-4 py-1.5 rounded-full text-xs font-medium text-white/95 mb-5 flex items-center gap-1.5 shadow-inner">
                    <i class="fa-solid fa-bolt-lightning text-[10px]"></i>
                    <span id="card-status-text">系统未就绪</span>
                </div>

                <h2 id="default-domain" class="font-bold tracking-wide mb-2 w-full break-all transition-all duration-300">未载入线路</h2>

                <p id="status-hint" class="text-xs sm:text-sm text-white/80 mb-6 font-medium tracking-wide">
                    等待 data 加载
                </p>

                <a id="default-entry-btn" href="#" target="_blank" rel="noopener noreferrer" draggable="false" aria-disabled="true" tabindex="-1" class="w-full bg-white dark:bg-gray-100 text-purple-700 dark:text-purple-900 py-3.5 px-6 rounded-2xl font-bold text-center text-base shadow-lg transition-all active:scale-[0.99] flex items-center justify-center gap-2 pointer-events-none opacity-80">
                    <span id="i18n-btn-enter">等待配置</span>
                    <i class="fa-solid fa-arrow-right text-sm"></i>
                </a>
            </div>

            <div>
                <div class="flex items-center justify-between mb-3 px-1">
                    <span class="text-[11px] font-bold text-gray-400 dark:text-gray-500 uppercase tracking-wider flex items-center gap-1.5">
                        <i class="fa-solid fa-list-ol"></i> <span id="i18n-list-title">全部线路</span>
                    </span>
                    <button id="retest-btn" type="button" class="text-xs font-semibold text-indigo-600 dark:text-indigo-400 flex items-center gap-1 transition-colors px-2 py-1 rounded-md pointer-events-none opacity-50">
                        <i id="retest-icon" class="fa-solid fa-arrows-rotate"></i> <span id="i18n-btn-retest">重新测速</span>
                    </button>
                </div>

                <div class="bg-gray-50/40 dark:bg-gray-950/50 rounded-2xl p-2 border border-gray-100/60 dark:border-gray-800/80 overflow-hidden">
                    <div class="max-h-[260px] overflow-y-auto pr-1.5 custom-scrollbar">
                        <div id="lines-container" class="relative w-full"></div>
                    </div>
                </div>
            </div>

            <div id="info-cards-container" class="bg-gray-50/50 dark:bg-gray-800/40 border border-gray-100 dark:border-gray-800/80 rounded-3xl p-5 space-y-5 shadow-sm transition-colors duration-500"></div>
        </div>

        <div class="px-6 py-6 bg-gray-50/70 dark:bg-gray-950/60 border-t border-gray-50 dark:border-gray-800/80 text-center text-xs text-gray-400 dark:text-gray-500 space-y-2.5 pb-12 sm:pb-6 transition-colors duration-500">
            <p class="text-gray-500 dark:text-gray-400 bg-white/80 dark:bg-gray-800/80 py-1.5 px-3 rounded-xl border border-gray-100 dark:border-gray-700/80 inline-block shadow-sm max-w-full text-left sm:text-center leading-relaxed" id="i18n-tip-box"></p>
            <p class="px-2" id="i18n-tip-desc"></p>
            <p class="pt-1 text-[11px] font-medium text-gray-400/80 dark:text-gray-600" id="i18n-tip-legal"></p>
        </div>
    </div>

    <div id="domain-tooltip" class="domain-tooltip" role="tooltip" aria-hidden="true"></div>

    <script src="./engine.js"></script>

    <script>
        (() => {
            const localHostnames = new Set(['localhost', '127.0.0.1', '[::1]']);
            const isLocal = localHostnames.has(location.hostname) || location.protocol === 'file:' || location.protocol === 'content:';
            if (!isLocal && location.protocol === 'http:') {
                location.replace(`https://${location.host}${location.pathname}${location.search}${location.hash}`);
            }
        })();

        const SCORE = Symbol('AlgorithmicScore');
        const UNAVAILABLE = Number.MAX_SAFE_INTEGER;
        const isAvailable = ms => Number.isFinite(ms) && ms < UNAVAILABLE;

        const PILL_COLOR_MAP = {
            emerald: 'bg-emerald-50 dark:bg-emerald-950/50 text-emerald-600 dark:text-emerald-400',
            teal: 'bg-teal-50 dark:bg-teal-950/50 text-teal-600 dark:text-teal-400',
            amber: 'bg-amber-50 dark:bg-amber-950/50 text-amber-600 dark:text-amber-400',
            orange: 'bg-orange-50 dark:bg-orange-950/50 text-orange-600 dark:text-orange-400',
            rose: 'bg-rose-50 dark:bg-rose-950/50 text-rose-600 dark:text-rose-400',
            blue: 'bg-blue-50 dark:bg-blue-950/50 text-blue-600 dark:text-blue-400',
            purple: 'bg-purple-50 dark:bg-purple-950/50 text-purple-600 dark:text-purple-400',
            gray: 'bg-gray-100 dark:bg-gray-700/60 text-gray-400 dark:text-gray-400'
        };

        const ICON_COLOR_MAP = {
            blue: 'bg-blue-50 dark:bg-blue-950/50 text-blue-500 dark:text-blue-400',
            red: 'bg-red-50 dark:bg-red-950/50 text-red-500 dark:text-red-400',
            emerald: 'bg-emerald-50 dark:bg-emerald-950/50 text-emerald-500 dark:text-emerald-400',
            purple: 'bg-purple-50 dark:bg-purple-950/50 text-purple-500 dark:text-purple-400',
            orange: 'bg-orange-50 dark:bg-orange-950/50 text-orange-500 dark:text-orange-400',
            sky: 'bg-sky-50 dark:bg-sky-950/50 text-sky-500 dark:text-sky-400',
            gray: 'bg-gray-100 dark:bg-gray-800 text-gray-500 dark:text-gray-400'
        };

        const DEFAULT_LEVELS = [
            { max: 100, label: { zh: '极速', en: 'Fast' }, color: 'emerald' },
            { max: 200, label: { zh: '流畅', en: 'Good' }, color: 'teal' },
            { max: 500, label: { zh: '一般', en: 'Normal' }, color: 'amber' },
            { max: 1000, label: { zh: '卡顿', en: 'Laggy' }, color: 'orange' },
            { max: 999999, label: { zh: '很差', en: 'Poor' }, color: 'rose' }
        ];

        let APP_CONFIG = {};
        let APP_THEME = {};
        let i18n = {};
        let domains = [];
        let testerEngine = null;
        let testResults = [];
        let isTesting = false;

        const isZH = (navigator.language || navigator.userLanguage || 'en').toLowerCase().includes('zh');
        const langKey = isZH ? 'zh' : 'en';
        const ROW_HEIGHT = 52;

        const container = document.getElementById('lines-container');
        const retestBtn = document.getElementById('retest-btn');
        const retestIcon = document.getElementById('retest-icon');
        const cardStatusText = document.getElementById('card-status-text');
        const defaultDomainEl = document.getElementById('default-domain');
        const defaultEntryBtn = document.getElementById('default-entry-btn');
        const statusHintEl = document.getElementById('status-hint');
        const domainTooltip = document.getElementById('domain-tooltip');

        let tooltipHideTimer = null;
        let longPressTimer = null;
        let touchStartX = 0;
        let touchStartY = 0;
        let suppressNextRowClick = false;
        let lastInputWasKeyboard = false;

        function clearTooltipHideTimer() {
            if (tooltipHideTimer) {
                clearTimeout(tooltipHideTimer);
                tooltipHideTimer = null;
            }
        }

        function hideDomainTooltip(delayMs = 0) {
            clearTooltipHideTimer();

            const hide = () => {
                domainTooltip.classList.remove('is-visible');
                domainTooltip.setAttribute('aria-hidden', 'true');
            };

            if (delayMs <= 0) {
                hide();
                return;
            }

            tooltipHideTimer = setTimeout(hide, delayMs);
        }

        function positionDomainTooltip(anchor) {
            const anchorRect = anchor.getBoundingClientRect();
            const tooltipRect = domainTooltip.getBoundingClientRect();
            const margin = 12;

            let left = anchorRect.left + (anchorRect.width - tooltipRect.width) / 2;
            left = Math.max(margin, Math.min(left, window.innerWidth - tooltipRect.width - margin));

            let top = anchorRect.top - tooltipRect.height - 10;
            let placement = 'top';

            if (top < margin) {
                top = anchorRect.bottom + 10;
                placement = 'bottom';
            }

            top = Math.max(margin, Math.min(top, window.innerHeight - tooltipRect.height - margin));
            domainTooltip.dataset.placement = placement;
            domainTooltip.style.left = `${Math.round(left)}px`;
            domainTooltip.style.top = `${Math.round(top)}px`;
        }

        function showDomainTooltip(anchor, fullDomain) {
            clearTooltipHideTimer();
            domainTooltip.textContent = fullDomain;
            domainTooltip.classList.add('is-visible');
            domainTooltip.setAttribute('aria-hidden', 'false');
            positionDomainTooltip(anchor);
        }

        function cancelLongPress() {
            if (longPressTimer) {
                clearTimeout(longPressTimer);
                longPressTimer = null;
            }
        }

        function resetTooltipInteractionState() {
            cancelLongPress();
            hideDomainTooltip(0);
            suppressNextRowClick = false;

            if (document.activeElement instanceof HTMLElement) {
                document.activeElement.blur();
            }
        }

        function bindDomainTooltip(element, fullDomain) {
            element.tabIndex = 0;
            element.dataset.fullDomain = fullDomain;
            element.setAttribute('aria-label', fullDomain);

            const getFullDomain = () => element.dataset.fullDomain || fullDomain;

            element.addEventListener('mouseenter', () => {
                showDomainTooltip(element, getFullDomain());
            });

            element.addEventListener('mouseleave', () => {
                hideDomainTooltip(1500);
            });

            element.addEventListener('focus', () => {
                if (lastInputWasKeyboard) showDomainTooltip(element, getFullDomain());
            });

            element.addEventListener('blur', () => {
                hideDomainTooltip(0);
            });

            element.addEventListener('touchstart', event => {
                if (event.touches.length !== 1) return;

                lastInputWasKeyboard = false;
                clearTooltipHideTimer();
                cancelLongPress();

                touchStartX = event.touches[0].clientX;
                touchStartY = event.touches[0].clientY;

                longPressTimer = setTimeout(() => {
                    longPressTimer = null;
                    suppressNextRowClick = true;
                    showDomainTooltip(element, getFullDomain());
                }, 500);
            }, { passive: true });

            element.addEventListener('touchmove', event => {
                if (event.touches.length !== 1) {
                    cancelLongPress();
                    return;
                }

                const deltaX = Math.abs(event.touches[0].clientX - touchStartX);
                const deltaY = Math.abs(event.touches[0].clientY - touchStartY);

                if (deltaX > 10 || deltaY > 10) cancelLongPress();
            }, { passive: true });

            element.addEventListener('touchend', () => {
                const wasLongPress = longPressTimer === null && domainTooltip.classList.contains('is-visible');
                cancelLongPress();
                if (wasLongPress) hideDomainTooltip(3000);
            }, { passive: true });

            element.addEventListener('touchcancel', () => {
                cancelLongPress();
                hideDomainTooltip(0);
            }, { passive: true });

            element.addEventListener('contextmenu', event => event.preventDefault());
            element.addEventListener('dragstart', event => event.preventDefault());
            element.addEventListener('selectstart', event => event.preventDefault());

            element.addEventListener('keydown', event => {
                if (event.key === 'Escape') {
                    hideDomainTooltip(0);
                    element.blur();
                }
            });
        }

        function setEntryEnabled(enabled, url = '#') {
            defaultEntryBtn.href = enabled ? url : '#';
            defaultEntryBtn.setAttribute('aria-disabled', String(!enabled));
            defaultEntryBtn.tabIndex = enabled ? 0 : -1;
            defaultEntryBtn.classList.toggle('pointer-events-none', !enabled);
            defaultEntryBtn.classList.toggle('opacity-80', !enabled);
        }

        function safeLocalizedText(value, fallback = '') {
            if (typeof value === 'string') return value;
            if (!value || typeof value !== 'object') return fallback;
            return String(value[langKey] || value.zh || value.en || fallback);
        }

        function sanitizeLimitedHtml(value) {
            const template = document.createElement('template');
            template.innerHTML = typeof value === 'string' ? value : '';
            const allowedTags = new Set(['B', 'STRONG', 'BR']);

            const cleanNode = node => {
                for (const child of [...node.childNodes]) {
                    if (child.nodeType === Node.ELEMENT_NODE) {
                        if (!allowedTags.has(child.tagName)) {
                            child.replaceWith(document.createTextNode(child.textContent || ''));
                            continue;
                        }
                        for (const attribute of [...child.attributes]) {
                            child.removeAttribute(attribute.name);
                        }
                        cleanNode(child);
                    } else if (child.nodeType !== Node.TEXT_NODE) {
                        child.remove();
                    }
                }
            };

            cleanNode(template.content);
            return template.content.cloneNode(true);
        }

        function validateRoutes(routeData, protocolMode) {
            if (!Array.isArray(routeData)) {
                throw new TypeError('routes.json must contain an array.');
            }

            const fallbackProtocol = protocolMode === 'http' ? 'http:' : 'https:';
            const unique = new Map();

            for (const item of routeData) {
                if (typeof item !== 'string') continue;
                const raw = item.trim();
                if (!raw) continue;

                try {
                    const hasScheme = /^[a-zA-Z][a-zA-Z\d+.-]*:/.test(raw);
                    const url = new URL(hasScheme ? raw : `${fallbackProtocol}//${raw}`);
                    if (!['http:', 'https:'].includes(url.protocol)) continue;
                    if (url.username || url.password) continue;

                    const key = url.href.toLowerCase();
                    if (!unique.has(key)) unique.set(key, raw);
                } catch (error) {
                    console.warn('Ignored invalid route:', raw);
                }
            }

            return [...unique.values()];
        }

        function validateLatencyLevels(levels) {
            if (!Array.isArray(levels) || levels.length === 0) return DEFAULT_LEVELS;

            const normalized = levels
                .filter(level => level && Number.isFinite(Number(level.max)))
                .map(level => ({
                    max: Math.max(0, Number(level.max)),
                    label: level.label && typeof level.label === 'object' ? level.label : {},
                    color: PILL_COLOR_MAP[level.color] ? level.color : 'gray'
                }))
                .sort((a, b) => a.max - b.max);

            return normalized.length > 0 ? normalized : DEFAULT_LEVELS;
        }

        function validateConfig(config) {
            if (!config || typeof config !== 'object' || Array.isArray(config)) {
                throw new TypeError('config.json must contain an object.');
            }

            const speedTest = config.speedTest && typeof config.speedTest === 'object'
                ? config.speedTest
                : {};

            return {
                ...config,
                title: typeof config.title === 'string' && config.title.trim() ? config.title.trim() : 'Beacon',
                defaultDomain: typeof config.defaultDomain === 'string' ? config.defaultDomain.trim() : '',
                speedTest,
                latencyLevels: validateLatencyLevels(config.latencyLevels),
                infoCards: Array.isArray(config.infoCards) ? config.infoCards : []
            };
        }

        function appendIcon(parent, iconClass) {
            const icon = document.createElement('i');
            const safeClasses = String(iconClass || 'fa-solid fa-globe')
                .split(/\s+/)
                .filter(className => /^fa[-\w]+$/.test(className));
            icon.className = safeClasses.length ? safeClasses.join(' ') : 'fa-solid fa-globe';
            parent.appendChild(icon);
        }

        function renderInfoCards() {
            const infoContainer = document.getElementById('info-cards-container');
            if (!infoContainer) return;
            infoContainer.replaceChildren();

            const cards = APP_CONFIG.infoCards.length > 0
                ? APP_CONFIG.infoCards
                : [
                    { iconClass: 'fa-solid fa-globe', title: { zh: '海外访问地址', en: 'Global Access' }, value: '暂无', color: 'blue' },
                    { iconClass: 'fa-solid fa-bookmark', title: { zh: '永久收藏地址', en: 'Bookmark' }, value: '暂无', color: 'red' }
                ];

            const linkColor = typeof APP_THEME.linkColor === 'string'
                ? APP_THEME.linkColor
                : 'text-indigo-600 dark:text-indigo-400';

            cards.forEach((card, index) => {
                if (!card || typeof card !== 'object') return;

                if (index > 0) {
                    const divider = document.createElement('div');
                    divider.className = 'border-t border-gray-100/80 dark:border-gray-800 my-1';
                    infoContainer.appendChild(divider);
                }

                const cardDiv = document.createElement('div');
                cardDiv.className = 'flex items-center gap-4 select-none py-1';

                const iconBox = document.createElement('div');
                iconBox.className = `w-11 h-11 rounded-2xl ${ICON_COLOR_MAP[card.color] || ICON_COLOR_MAP.blue} flex items-center justify-center shrink-0 shadow-sm`;
                appendIcon(iconBox, card.iconClass || card.icon);

                const textBox = document.createElement('div');
                const title = document.createElement('h4');
                title.className = 'text-sm font-bold text-gray-800 dark:text-gray-200 tracking-wide';
                title.textContent = safeLocalizedText(card.title);

                const value = typeof card.value === 'string' ? card.value.trim() : '';
                let valueElement;

                try {
                    const valueUrl = new URL(value);
                    if (!['http:', 'https:', 'mailto:'].includes(valueUrl.protocol)) throw new Error('Unsupported protocol');

                    valueElement = document.createElement('a');
                    valueElement.href = valueUrl.href;
                    valueElement.target = '_blank';
                    valueElement.rel = 'noopener noreferrer';
                    valueElement.draggable = false;
                    valueElement.className = `${linkColor} text-sm font-semibold mt-0.5 break-all inline-block cursor-pointer`;
                    valueElement.textContent = value;
                } catch (error) {
                    valueElement = document.createElement('p');
                    valueElement.className = 'text-sm font-semibold text-gray-400/70 dark:text-gray-500 mt-0.5 break-all';
                    valueElement.textContent = value || (isZH ? '暂无' : 'N/A');
                }

                textBox.append(title, valueElement);
                cardDiv.append(iconBox, textBox);
                infoContainer.appendChild(cardDiv);
            });
        }

        async function loadJson(path, fallback = null) {
            const response = await fetch(`${path}?t=${Date.now()}`, { cache: 'no-store' });
            if (!response.ok) throw new Error(`${path} returned HTTP ${response.status}`);
            return response.json().catch(() => fallback);
        }

        async function loadModularJSONs() {
            try {
                const [configData, routeData, themeData, languageData, announcementData] = await Promise.all([
                    loadJson('./data/config.json'),
                    loadJson('./data/routes.json'),
                    loadJson('./data/theme.json', {}).catch(() => ({})),
                    loadJson('./data/language.json', {}).catch(() => ({})),
                    loadJson('./data/announcement.json', {}).catch(() => ({}))
                ]);

                APP_CONFIG = validateConfig(configData);
                APP_THEME = themeData && typeof themeData === 'object' ? themeData : {};
                domains = validateRoutes(routeData, APP_CONFIG.speedTest.protocolMode);

                if (domains.length === 0) {
                    throw new Error('No valid routes were found in routes.json.');
                }

                const langDict = languageData && languageData[langKey] && typeof languageData[langKey] === 'object'
                    ? languageData[langKey]
                    : {};
                const announcementDict = announcementData && announcementData[langKey] && typeof announcementData[langKey] === 'object'
                    ? announcementData[langKey]
                    : {};
                i18n = { ...langDict, ...announcementDict };

                if (typeof APP_THEME.cardGradient === 'string' && APP_THEME.cardGradient.trim()) {
                    document.getElementById('default-line-card').className = `bg-gradient-to-br ${APP_THEME.cardGradient} rounded-3xl p-6 sm:p-8 text-white shadow-xl shadow-purple-600/20 dark:shadow-none flex flex-col items-start border border-white/10 relative overflow-hidden transition-all duration-500`;
                }
                if (typeof APP_THEME.btnColor === 'string' && APP_THEME.btnColor.trim()) {
                    defaultEntryBtn.className = `w-full ${APP_THEME.btnColor} py-3.5 px-6 rounded-2xl font-bold text-center text-base shadow-lg transition-all active:scale-[0.99] flex items-center justify-center gap-2 pointer-events-none opacity-80`;
                }

                document.title = APP_CONFIG.title;
                document.getElementById('i18n-sub-bold').textContent = i18n.subBold || '智能线路优选';
                document.getElementById('i18n-sub-text').textContent = i18n.subText || '就绪';
                document.getElementById('i18n-btn-enter').textContent = i18n.enterBtn || '立即进入';
                document.getElementById('i18n-list-title').textContent = i18n.listTitle || '全部线路';
                document.getElementById('i18n-btn-retest').textContent = i18n.retestBtn || '重新测速';

                const tipBox = document.getElementById('i18n-tip-box');
                tipBox.replaceChildren(sanitizeLimitedHtml(i18n.tipBox || ''));
                document.getElementById('i18n-tip-desc').textContent = i18n.tipDesc || '';
                document.getElementById('i18n-tip-legal').textContent = i18n.tipLegal || '';

                renderInfoCards();
                retestBtn.classList.remove('pointer-events-none', 'opacity-50');

                const initialDomain = domains.includes(APP_CONFIG.defaultDomain)
                    ? APP_CONFIG.defaultDomain
                    : domains[0];
                updateTopCardDomain(initialDomain);
                setEntryEnabled(false);

                const speedConfig = APP_CONFIG.speedTest;
                testerEngine = new BeaconEngine({
                    timeoutMs: speedConfig.timeout,
                    concurrency: speedConfig.concurrency,
                    pingCount: speedConfig.sample,
                    protocolMode: speedConfig.protocolMode,
                    probeMode: speedConfig.probeMode,
                    capabilityTtl: speedConfig.capabilityTtl,
                    resources: speedConfig.resources,
                    currentWeight: speedConfig.currentWeight,
                    historyWeight: speedConfig.historyWeight,
                    timeoutPenalty: speedConfig.timeoutPenalty
                });

                return true;
            } catch (error) {
                console.error('Config load failed:', error);
                cardStatusText.textContent = isZH ? '配置加载失败' : 'Configuration failed';
                statusHintEl.textContent = isZH
                    ? '配置读取失败，请检查 data 目录和 JSON 格式'
                    : 'Failed to load configuration. Check the data folder and JSON syntax.';
                setEntryEnabled(false);
                return false;
            }
        }

        function getListFontSizeClass(domain, available) {
            const baseWeight = available
                ? 'font-semibold text-gray-800 dark:text-gray-100'
                : 'font-medium text-gray-400/80 dark:text-gray-500';

            return `${baseWeight} text-sm sm:text-base truncate whitespace-nowrap transition-all duration-300`;
        }

        function updateTopCardDomain(domain) {
            let displayDomain = String(domain || '');
            try {
                const target = testerEngine ? testerEngine.getTargetUrl(displayDomain) : new URL(/^https?:\/\//i.test(displayDomain) ? displayDomain : `https://${displayDomain}`).href;
                const url = new URL(target);
                displayDomain = `${url.host}${url.pathname === '/' ? '' : url.pathname}`.replace(/\/$/, '');
            } catch (error) {
                displayDomain = displayDomain.replace(/^https?:\/\//i, '').replace(/\/+$/, '');
            }

            defaultDomainEl.textContent = displayDomain;
            defaultDomainEl.className = 'domain-trigger font-bold text-xl sm:text-2xl tracking-wide mb-2 w-full truncate transition-all duration-300 cursor-help rounded-md px-1 -mx-1';

            if (defaultDomainEl.dataset.tooltipBound !== 'true') {
                bindDomainTooltip(defaultDomainEl, displayDomain);
                defaultDomainEl.dataset.tooltipBound = 'true';
            }

            defaultDomainEl.dataset.fullDomain = displayDomain;
            defaultDomainEl.setAttribute('aria-label', displayDomain);
        }

        function initListUI() {
            if (container.children.length !== domains.length) {
                container.replaceChildren();
                testResults = [];
                container.style.height = `${domains.length * ROW_HEIGHT}px`;

                domains.forEach((domain, index) => {
                    testResults.push({ domain, ms: undefined, [SCORE]: undefined, index, lastRank: index });

                    const row = document.createElement('div');
                    row.id = `line-row-${index}`;
                    row.className = 'absolute left-0 right-0 h-[48px] flex items-center justify-between px-2 sm:px-3 rounded-xl bg-white dark:bg-gray-800/90 border border-gray-100/40 dark:border-gray-700/50 cursor-pointer opacity-100 gpu-slide';
                    row.style.transform = `translateY(${index * ROW_HEIGHT}px)`;

                    const left = document.createElement('div');
                    left.className = 'flex items-center gap-2.5 overflow-hidden';

                    const badge = document.createElement('div');
                    badge.id = `badge-${index}`;
                    badge.className = 'w-8 h-8 rounded-xl bg-gray-100 dark:bg-gray-700/60 text-gray-400 dark:text-gray-400 text-xs font-bold flex items-center justify-center shrink-0 transition-all duration-300';
                    badge.textContent = '-';

                    const domainText = document.createElement('span');
                    domainText.id = `domain-text-${index}`;
                    domainText.className = `domain-trigger ${getListFontSizeClass(domain, true)} cursor-help rounded-md px-1 -mx-1`;
                    domainText.textContent = domain;
                    bindDomainTooltip(domainText, domain);

                    const pill = document.createElement('div');
                    pill.id = `pill-${index}`;
                    pill.className = 'bg-gray-100 dark:bg-gray-700/60 text-gray-400 dark:text-gray-400 px-3 py-1.5 rounded-full text-[11px] sm:text-xs font-medium flex items-center gap-1 shrink-0 tracking-wide shadow-sm transition-all duration-500 animate-pulse';
                    pill.textContent = i18n.pillTesting || '● 采集中...';

                    left.append(badge, domainText);
                    row.append(left, pill);
                    container.appendChild(row);
                });
            } else {
                testResults.forEach(item => {
                    item.ms = undefined;
                    item[SCORE] = undefined;

                    const badge = document.getElementById(`badge-${item.index}`);
                    const pill = document.getElementById(`pill-${item.index}`);
                    const domainText = document.getElementById(`domain-text-${item.index}`);
                    const row = document.getElementById(`line-row-${item.index}`);

                    if (badge) {
                        badge.className = 'w-8 h-8 rounded-xl bg-gray-100 dark:bg-gray-700/60 text-gray-400 dark:text-gray-400 text-xs font-bold flex items-center justify-center shrink-0 transition-all duration-300';
                        badge.textContent = '-';
                    }
                    if (pill) {
                        pill.className = 'bg-gray-100 dark:bg-gray-700/60 text-gray-400 dark:text-gray-400 px-3 py-1.5 rounded-full text-[11px] sm:text-xs font-medium flex items-center gap-1 shrink-0 tracking-wide shadow-sm transition-all duration-500 animate-pulse';
                        pill.textContent = i18n.pillTesting || '● 采集中...';
                    }
                    if (domainText) {
                        domainText.className = `domain-trigger ${getListFontSizeClass(item.domain, true)} cursor-help rounded-md px-1 -mx-1`;
                    }
                    if (row) {
                        row.onclick = null;
                        row.style.transform = `translateY(${item.index * ROW_HEIGHT}px)`;
                    }
                });
            }
        }

        function updatePillContent(item) {
            const testing = item.ms === undefined;
            const available = isAvailable(item.ms);
            const pill = document.getElementById(`pill-${item.index}`);
            const domainText = document.getElementById(`domain-text-${item.index}`);
            if (!pill || !domainText) return;

            domainText.className = `domain-trigger ${getListFontSizeClass(item.domain, !testing && available)} cursor-help rounded-md px-1 -mx-1`;

            let pillClass;
            let pillText;

            if (testing) {
                pillClass = 'bg-gray-100 dark:bg-gray-700/60 text-gray-400 dark:text-gray-400 animate-pulse';
                pillText = i18n.pillTesting || '● 采集中...';
            } else if (!available) {
                pillClass = 'bg-rose-50 dark:bg-rose-950/50 text-rose-400/90 dark:text-rose-400';
                pillText = i18n.pillOffline || '● 暂不可用';
            } else {
                const levels = APP_CONFIG.latencyLevels;
                const matched = levels.find(level => item.ms <= level.max) || levels[levels.length - 1];
                pillClass = PILL_COLOR_MAP[matched.color] || PILL_COLOR_MAP.gray;
                pillText = `● ${safeLocalizedText(matched.label)} ${item.ms}ms`;
            }

            pill.className = `${pillClass} px-3 py-1.5 rounded-full text-[11px] sm:text-xs font-bold flex items-center gap-1 shrink-0 tracking-wide shadow-sm transition-all duration-300`;
            pill.textContent = pillText;
        }

        function finalSortAndRender() {
            const sorted = [...testResults].sort((a, b) => {
                const scoreA = a[SCORE] ?? UNAVAILABLE;
                const scoreB = b[SCORE] ?? UNAVAILABLE;
                return scoreA === scoreB ? a.lastRank - b.lastRank : scoreA - scoreB;
            });

            let rank = 1;

            sorted.forEach((item, sortedIndex) => {
                item.lastRank = sortedIndex;
                const row = document.getElementById(`line-row-${item.index}`);
                const badge = document.getElementById(`badge-${item.index}`);
                if (!row || !badge) return;

                row.style.transform = `translateY(${sortedIndex * ROW_HEIGHT}px)`;
                const available = isAvailable(item.ms);

                if (available) {
                    badge.className = 'w-8 h-8 rounded-xl bg-indigo-50 dark:bg-indigo-950/60 text-indigo-600 dark:text-indigo-400 text-xs font-extrabold flex items-center justify-center shrink-0 transition-all duration-300';
                    badge.textContent = String(rank++);
                } else {
                    badge.className = 'w-8 h-8 rounded-xl bg-gray-50 dark:bg-gray-800 text-gray-300 dark:text-gray-600 text-xs font-extrabold flex items-center justify-center shrink-0 transition-all duration-300';
                    badge.textContent = '-';
                }

                row.onclick = event => {
                    if (suppressNextRowClick) {
                        suppressNextRowClick = false;
                        event.preventDefault();
                        return;
                    }

                    if (item.ms === undefined) return;
                    if (!available) {
                        alert(i18n.alertOffline || '❌ 该线路暂不可用');
                        return;
                    }

                    resetTooltipInteractionState();
                    const popup = window.open(testerEngine.getTargetUrl(item.domain), '_blank', 'noopener,noreferrer');
                    if (popup) popup.opener = null;
                };
            });
        }

        async function startSpeedTest() {
            if (!testerEngine || isTesting) return;
            isTesting = true;
            testerEngine.cancelCurrentRun();

            retestBtn.disabled = true;
            retestBtn.classList.add('opacity-50', 'pointer-events-none');
            retestIcon.classList.add('animate-spin');
            setEntryEnabled(false);
            initListUI();

            document.getElementById('i18n-sub-text').textContent = i18n.subText || '动态路由测速中...';
            cardStatusText.textContent = i18n.statusTesting || '正在检测线路延迟...';
            statusHintEl.textContent = i18n.hintLoading || '正在获取测速结果...';

            let availableCount = 0;

            const onProgress = (index, currentMedian) => {
                const domain = domains[index];
                testResults[index].ms = currentMedian;
                testResults[index][SCORE] = testerEngine.getScore(domain, currentMedian);
                if (isAvailable(currentMedian)) availableCount += 1;
                updatePillContent(testResults[index]);
            };

            try {
                await testerEngine.runPool(domains, onProgress);
                finalSortAndRender();

                const validNodes = testResults
                    .filter(result => isAvailable(result.ms) && Number.isFinite(result[SCORE]))
                    .sort((a, b) => a[SCORE] - b[SCORE]);

                if (validNodes.length > 0) {
                    const bestNode = validNodes[0];
                    updateTopCardDomain(bestNode.domain);
                    setEntryEnabled(true, testerEngine.getTargetUrl(bestNode.domain));
                    document.getElementById('i18n-sub-text').textContent = i18n.statusDone || '最佳线路已就绪';
                    cardStatusText.textContent = i18n.statusFound || '已选择当前最优线路';
                    statusHintEl.textContent = isZH
                        ? `共 ${availableCount}/${domains.length} 条可用网络`
                        : `${availableCount}/${domains.length} networks available`;
                } else {
                    setEntryEnabled(false);
                    defaultDomainEl.textContent = isZH ? '暂无可用线路' : 'No route available';
                    document.getElementById('i18n-sub-text').textContent = isZH ? '测速完成' : 'Test completed';
                    cardStatusText.textContent = isZH ? '未找到可用线路' : 'No available route';
                    statusHintEl.textContent = isZH
                        ? '所有线路均未通过当前浏览器的网络探测，请稍后重试'
                        : 'All routes failed the current browser probe. Please retry later.';
                }
            } catch (error) {
                console.error('Speed test failed:', error);
                setEntryEnabled(false);
                cardStatusText.textContent = isZH ? '测速发生错误' : 'Speed test failed';
                statusHintEl.textContent = isZH ? '请重新测速或检查浏览器控制台' : 'Please retry or inspect the browser console.';
            } finally {
                isTesting = false;
                retestBtn.disabled = false;
                retestBtn.classList.remove('opacity-50', 'pointer-events-none');
                retestIcon.classList.remove('animate-spin');
            }
        }

        window.addEventListener('DOMContentLoaded', async () => {
            if (typeof BeaconEngine === 'undefined') {
                statusHintEl.textContent = isZH ? 'Engine 缺失（engine.js 未加载）' : 'engine.js is missing.';
                return;
            }

            const ready = await loadModularJSONs();
            if (ready) startSpeedTest();
        });

        document.addEventListener('keydown', event => {
            if (event.key === 'Tab') lastInputWasKeyboard = true;
        }, true);

        document.addEventListener('pointerdown', event => {
            lastInputWasKeyboard = false;
            if (!event.target.closest('[data-full-domain]')) hideDomainTooltip(0);
        }, true);

        window.addEventListener('resize', () => hideDomainTooltip(0));
        window.addEventListener('scroll', () => hideDomainTooltip(0), true);
        window.addEventListener('pageshow', () => {
            resetTooltipInteractionState();
            lastInputWasKeyboard = false;
        });

        document.addEventListener('visibilitychange', () => {
            if (document.hidden) resetTooltipInteractionState();
        });

        window.addEventListener('pagehide', () => {
            resetTooltipInteractionState();
            if (testerEngine) testerEngine.destroy();
        });

        defaultEntryBtn.addEventListener('click', event => {
            if (defaultEntryBtn.getAttribute('aria-disabled') === 'true') {
                event.preventDefault();
                return;
            }
            resetTooltipInteractionState();
        });

        retestBtn.addEventListener('click', startSpeedTest);
    </script>
</body>
</html>
